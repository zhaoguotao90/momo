<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞鹰武士 - 修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0a0a1a; 
            color: white; 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        .game-container { 
            width: 100%; 
            max-width: 800px; 
            background: #1a1a2e; 
            border-radius: 10px; 
            overflow: hidden; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); 
        }
        
        .header { 
            background: linear-gradient(90deg, #ff6b00, #ffa500); 
            padding: 20px; 
            text-align: center; 
        }
        
        .header h1 { 
            color: white; 
            font-size: 24px; 
            margin-bottom: 5px; 
        }
        
        .header p { 
            color: #ffe0b3; 
            font-size: 14px; 
        }
        
        .game-frame { 
            width: 100%; 
            height: 500px; 
            background: black; 
            position: relative; 
        }
        
        #ruffle-container { 
            width: 100%; 
            height: 100%; 
        }
        
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            padding: 20px; 
        }
        
        .btn { 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s; 
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); 
        }
        
        .btn:active { 
            transform: translateY(0); 
        }
        
        .btn-orange { 
            background: linear-gradient(135deg, #ff9800, #f57c00); 
        }
        
        .btn-red { 
            background: linear-gradient(135deg, #e74c3c, #c0392b); 
        }
        
        .btn-green { 
            background: linear-gradient(135deg, #2ecc71, #27ae60); 
        }
        
        .status-bar { 
            padding: 15px; 
            background: rgba(0,0,0,0.3); 
            border-top: 1px solid #34495e; 
        }
        
        .status-text { 
            text-align: center; 
            color: #bdc3c7; 
        }
        
        .error-box { 
            display: none; 
            background: rgba(231, 76, 60, 0.1); 
            border-left: 4px solid #e74c3c; 
            padding: 15px; 
            margin: 15px; 
            border-radius: 4px; 
        }
        
        .loader { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 300px; 
        }
        
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 5px solid rgba(255,255,255,0.1); 
            border-top: 5px solid #ff9800; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 20px; 
        }
        
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        .mobile-warning { 
            background: #f39c12; 
            color: #fff; 
            padding: 10px; 
            text-align: center; 
            font-size: 14px; 
        }
        
        @media (max-width: 600px) { 
            .game-frame { height: 400px; } 
            .controls { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🦅 飞鹰武士</h1>
            <p>经典Flash动作游戏 - 增强版加载器</p>
        </div>
        
        <div class="mobile-warning" id="mobile-warning">
            📱 手机用户提示：如加载缓慢，请尝试使用Chrome浏览器或刷新页面
        </div>
        
        <div class="error-box" id="error-box">
            <strong>⚠️ 加载错误：</strong>
            <p id="error-message"></p>
            <button class="btn btn-red" onclick="retryLoad()" style="margin-top: 10px;">重试加载</button>
        </div>
        
        <div class="game-frame">
            <div id="ruffle-container">
                <!-- 加载动画 -->
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p id="loading-text">正在加载Ruffle模拟器...</p>
                    <p id="progress-text" style="font-size: 12px; margin-top: 10px;"></p>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-green" onclick="startGame()">▶ 开始游戏</button>
            <button class="btn" onclick="toggleFullscreen()">📺 全屏模式</button>
            <button class="btn btn-orange" onclick="restartGame()">🔄 重新开始</button>
            <button class="btn btn-red" onclick="reloadRuffle()">🔄 重新加载模拟器</button>
        </div>
        
        <div class="status-bar">
            <div class="status-text">
                <span id="status">状态: 初始化中...</span> | 
                <span id="version">Ruffle版本: 加载中...</span>
            </div>
        </div>
        
        <div style="padding: 15px; background: rgba(0,0,0,0.2); font-size: 12px; color: #95a5a6;">
            <p>💡 提示：如果加载失败，请尝试：</p>
            <ol style="margin-left: 20px; margin-top: 5px;">
                <li>使用Chrome浏览器访问</li>
                <li>刷新页面并等待30秒</li>
                <li>点击"重新加载模拟器"按钮</li>
                <li>检查网络连接</li>
            </ol>
        </div>
    </div>
    
    <!-- 使用更稳定的Ruffle版本 -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2023.10.31/ruffle.js"></script>
    
    <script>
        // 游戏状态变量
        let ruffle = null;
        let player = null;
        let isGameLoaded = false;
        let loadAttempts = 0;
        const MAX_ATTEMPTS = 3;
        
        // 加载状态
        const loadStates = [
            "初始化Ruffle模拟器...",
            "加载核心模块...",
            "准备游戏环境...",
            "加载游戏文件...",
            "游戏资源处理中..."
        ];
        let currentState = 0;
        
        // 更新加载状态
        function updateLoadState() {
            const textElement = document.getElementById('loading-text');
            const progressElement = document.getElementById('progress-text');
            
            if (currentState < loadStates.length) {
                textElement.textContent = loadStates[currentState];
                progressElement.textContent = `进度: ${Math.round((currentState + 1) / loadStates.length * 100)}%`;
                currentState++;
                
                if (currentState < loadStates.length) {
                    setTimeout(updateLoadState, 2000);
                } else {
                    textElement.textContent = "加载超时，正在尝试修复...";
                    setTimeout(checkRuffleLoad, 1000);
                }
            }
        }
        
        // 检查Ruffle是否加载
        function checkRuffleLoad() {
            if (typeof window.RufflePlayer === 'undefined') {
                loadAttempts++;
                if (loadAttempts < MAX_ATTEMPTS) {
                    showError(`Ruffle模拟器加载失败 (尝试 ${loadAttempts}/${MAX_ATTEMPTS})，正在重试...`);
                    setTimeout(initRuffle, 3000);
                } else {
                    showError("Ruffle模拟器加载失败，请刷新页面或更换浏览器");
                }
                return false;
            }
            return true;
        }
        
        // 初始化Ruffle
        function initRuffle() {
            if (!checkRuffleLoad()) return;
            
            try {
                document.getElementById('loading-text').textContent = "Ruffle加载成功，正在初始化游戏...";
                
                ruffle = window.RufflePlayer.newest();
                document.getElementById('version').textContent = `Ruffle版本: ${ruffle.version}`;
                
                player = ruffle.createPlayer();
                const container = document.getElementById('ruffle-container');
                
                // 清空加载动画
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.display = 'none';
                }
                
                // 配置播放器
                player.style.width = '100%';
                player.style.height = '100%';
                player.style.display = 'block';
                container.appendChild(player);
                
                // 加载游戏
                loadGame();
                
            } catch (error) {
                showError(`Ruffle初始化失败: ${error.message}`);
                console.error("Ruffle初始化错误:", error);
            }
        }
        
        // 加载游戏
        function loadGame() {
            if (!player) {
                showError("播放器未初始化");
                return;
            }
            
            document.getElementById('status').textContent = "状态: 加载游戏文件中...";
            
            // 尝试从多个可能的路径加载游戏
            const gamePaths = [
                'feiyingwushi.swf',
                './feiyingwushi.swf',
                'https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf'
            ];
            
            let currentPathIndex = 0;
            
            function tryLoadPath() {
                if (currentPathIndex >= gamePaths.length) {
                    showError("无法加载游戏文件，请确保feiyingwushi.swf文件存在");
                    return;
                }
                
                const gamePath = gamePaths[currentPathIndex];
                document.getElementById('loading-text').textContent = `尝试从路径加载: ${gamePath}`;
                
                player.load(gamePath)
                    .then(() => {
                        document.getElementById('status').textContent = "状态: 游戏加载成功";
                        isGameLoaded = true;
                        document.getElementById('loading-text').textContent = "✅ 游戏加载完成！点击开始游戏按钮";
                        console.log("游戏加载成功");
                    })
                    .catch(error => {
                        console.warn(`从 ${gamePath} 加载失败:`, error);
                        currentPathIndex++;
                        
                        if (currentPathIndex < gamePaths.length) {
                            setTimeout(tryLoadPath, 1000);
                        } else {
                            showError(`游戏加载失败: ${error.message}`);
                        }
                    });
            }
            
            tryLoadPath();
        }
        
        // 显示错误
        function showError(message) {
            console.error("错误:", message);
            document.getElementById('error-message').textContent = message;
            document.getElementById('error-box').style.display = 'block';
            document.getElementById('status').textContent = "状态: 加载失败";
        }
        
        // 隐藏错误
        function hideError() {
            document.getElementById('error-box').style.display = 'none';
        }
        
        // 开始游戏
        function startGame() {
            if (isGameLoaded && player) {
                try {
                    player.play();
                    document.getElementById('status').textContent = "状态: 游戏中";
                } catch (error) {
                    showError(`开始游戏失败: ${error.message}`);
                }
            } else {
                showError("游戏尚未加载完成，请稍候...");
            }
        }
        
        // 重新开始游戏
        function restartGame() {
            if (isGameLoaded && player) {
                try {
                    player.restart();
                    document.getElementById('status').textContent = "状态: 重新开始";
                } catch (error) {
                    showError(`重新开始失败: ${error.message}`);
                }
            } else {
                showError("游戏未加载");
            }
        }
        
        // 切换全屏
        function toggleFullscreen() {
            if (player && isGameLoaded) {
                try {
                    player.fullscreen();
                } catch (error) {
                    // 如果播放器不支持全屏，则尝试容器全屏
                    const container = document.querySelector('.game-container');
                    if (container.requestFullscreen) {
                        container.requestFullscreen();
                    }
                }
            } else {
                const container = document.querySelector('.game-container');
                if (container.requestFullscreen) {
                    container.requestFullscreen();
                }
            }
        }
        
        // 重新加载Ruffle
        function reloadRuffle() {
            location.reload();
        }
        
        // 重试加载
        function retryLoad() {
            hideError();
            isGameLoaded = false;
            currentState = 0;
            loadAttempts = 0;
            
            const container = document.getElementById('ruffle-container');
            container.innerHTML = '';
            
            const loader = document.createElement('div');
            loader.className = 'loader';
            loader.innerHTML = `
                <div class="spinner"></div>
                <p id="loading-text">重新加载中...</p>
                <p id="progress-text" style="font-size: 12px; margin-top: 10px;"></p>
            `;
            container.appendChild(loader);
            
            document.getElementById('status').textContent = "状态: 重新加载中...";
            
            // 重新初始化
            setTimeout(() => {
                initRuffle();
                updateLoadState();
            }, 500);
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否移动设备
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (isMobile) {
                document.getElementById('mobile-warning').style.display = 'block';
                
                // 移动设备特殊处理
                setTimeout(function() {
                    if (!isGameLoaded) {
                        document.getElementById('mobile-warning').innerHTML = 
                            '📱 手机加载较慢，建议:<br>1. 使用Chrome浏览器<br>2. 连接WiFi网络<br>3. 耐心等待30秒';
                    }
                }, 10000);
            }
            
            // 开始加载流程
            updateLoadState();
            
            // 延迟初始化Ruffle，确保页面完全加载
            setTimeout(initRuffle, 1000);
            
            // 设置超时检测
            setTimeout(function() {
                if (!isGameLoaded) {
                    document.getElementById('loading-text').textContent = "加载时间较长，正在尝试优化...";
                    
                    // 尝试使用备用加载方法
                    if (typeof window.RufflePlayer !== 'undefined' && !player) {
                        initRuffle();
                    }
                }
            }, 15000);
        });
        
        // 键盘快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' || e.key === 'Spacebar') { // 空格键
                e.preventDefault();
                startGame();
            } else if (e.key === 'r' || e.key === 'R') { // R键
                restartGame();
            } else if (e.key === 'f' || e.key === 'F') { // F键
                toggleFullscreen();
            } else if (e.key === 'Escape') { // ESC键
                if (document.fullscreenElement) {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
