<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>飞鹰武士 - 极简版</title>
    <style>
        body { margin:0; background:#000; }
        #game { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="game"></div>
    
    <script src="https://unpkg.com/@ruffle-rs/ruffle@latest/dist/ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener('DOMContentLoaded', () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById('game').appendChild(player);
            
            // 尝试多个路径
            const paths = ['feiyingwushi.swf', './feiyingwushi.swf'];
            let current = 0;
            
            function tryLoad() {
                if(current >= paths.length) {
                    document.getElementById('game').innerHTML = 
                        '<div style="color:white;padding:20px;text-align:center">' +
                        '游戏加载失败<br>' +
                        '<button onclick="location.reload()" style="padding:10px;margin:10px">重新加载</button>' +
                        '</div>';
                    return;
                }
                
                player.load(paths[current]).catch(() => {
                    current++;
                    tryLoad();
                });
            }
            
            tryLoad();
        });
    </script>
</body>
</html>
