<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞鹰武士 - GitHub Pages 修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white; 
            font-family: Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: rgba(0,0,0,0.8); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { 
            color: #ffcc00; 
            margin: 15px 0; 
            font-size: 24px; 
        }
        .game-box { 
            width: 100%; 
            height: 350px; 
            background: #000; 
            border-radius: 10px; 
            margin: 20px 0; 
            position: relative; 
            overflow: hidden; 
            border: 2px solid #444; 
        }
        #ruffle-container { 
            width: 100%; 
            height: 100%; 
        }
        .status { 
            background: rgba(0,0,0,0.5); 
            padding: 10px; 
            border-radius: 5px; 
            margin: 10px 0; 
            font-size: 14px; 
        }
        button { 
            padding: 12px 25px; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 5px; 
        }
        .error { 
            background: rgba(231, 76, 60, 0.2); 
            border: 1px solid #e74c3c; 
            padding: 15px; 
            border-radius: 8px; 
            margin: 15px 0; 
            display: none; 
        }
        .debug { 
            background: rgba(52, 152, 219, 0.1); 
            padding: 10px; 
            border-radius: 5px; 
            font-size: 12px; 
            margin-top: 15px; 
            text-align: left; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>飞鹰武士 - GitHub Pages 修复版</h1>
        <p>专为 GitHub Pages 部署优化</p>
        
        <div class="status" id="status">状态: 初始化中...</div>
        
        <div class="game-box">
            <div id="ruffle-container">
                <!-- Ruffle将在此加载游戏 -->
            </div>
        </div>
        
        <div class="error" id="error-box">
            <h3>⚠️ 文件加载错误</h3>
            <p id="error-message"></p>
            <div style="margin-top: 15px;">
                <button onclick="retryLoad()">重新加载</button>
            </div>
        </div>
        
        <button onclick="startGame()" id="start-btn" disabled>开始游戏</button>
        
        <div class="debug" id="debug-info">
            <strong>调试信息：</strong><br>
        </div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #ccc;">
            <p>部署成功后访问地址：https://zhaoguotao90.github.io/momo/</p>
            <p>注意：第一次部署后可能需要等待 1-5 分钟生效</p>
        </div>
    </div>

    <!-- 使用稳定的 Ruffle CDN -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2025.3.1/ruffle.js"></script>
    
    <script>
        let ruffle = null;
        let player = null;
        const repoName = "momo"; // 你的仓库名
        const swfFileName = "feiyingwushi.swf";

        // 自动适配 GitHub Pages 路径
        function getSWFPath() {
            // 如果是本地打开，用相对路径；如果是 GitHub Pages，用仓库根目录路径
            const isGitHubPages = window.location.hostname.includes("github.io");
            if (isGitHubPages) {
                // 你的部署地址是 https://zhaoguotao90.github.io/momo/
                return `/${repoName}/${swfFileName}`;
            } else {
                // 本地测试用相对路径
                return swfFileName;
            }
        }

        // 更新状态
        function updateStatus(text) {
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.textContent = `状态: ${text}`;
            console.log(`状态: ${text}`);
        }

        // 显示错误
        function showError(message) {
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-message');
            if (errorBox) errorBox.style.display = 'block';
            if (errorMsg) errorMsg.textContent = message;
            updateStatus(`错误: ${message}`);
        }

        // 隐藏错误
        function hideError() {
            const errorBox = document.getElementById('error-box');
            if (errorBox) errorBox.style.display = 'none';
        }

        // 加载游戏（直接用 Ruffle 加载，不做跨域 fetch 检查）
        async function loadGame() {
            const swfPath = getSWFPath();
            updateStatus(`正在加载: ${swfPath}`);
            document.getElementById('debug-info').innerHTML += `<div>尝试加载路径: ${swfPath}</div>`;

            // 初始化 Ruffle
            if (!ruffle) {
                if (typeof window.RufflePlayer === 'undefined') {
                    showError('Ruffle 模拟器加载失败，请检查网络');
                    return;
                }
                ruffle = window.RufflePlayer.newest();
            }

            // 创建播放器
            if (!player) {
                player = ruffle.createPlayer();
                const container = document.getElementById('ruffle-container');
                if (container) {
                    container.innerHTML = '';
                    container.appendChild(player);
                    player.style.width = '100%';
                    player.style.height = '100%';
                }
            }

            // 加载 SWF 文件
            try {
                await player.load(swfPath);
                updateStatus('游戏加载成功！');
                document.getElementById('start-btn').disabled = false;
                hideError();
                document.getElementById('debug-info').innerHTML += `<div style="color: green;">✓ 加载成功！</div>`;
            } catch (error) {
                showError(`加载失败: ${error.message}`);
                document.getElementById('debug-info').innerHTML += `<div style="color: red;">✗ 加载失败: ${error.message}</div>`;
            }
        }

        // 开始游戏
        function startGame() {
            if (player) {
                try {
                    player.play();
                    updateStatus('游戏中...');
                } catch (error) {
                    showError(`启动失败: ${error.message}`);
                }
            } else {
                showError('游戏未加载，请先等待加载完成');
            }
        }

        // 重新加载
        function retryLoad() {
            hideError();
            updateStatus('重新加载中...');
            document.getElementById('debug-info').innerHTML = '<strong>调试信息：</strong><br>';
            loadGame();
        }

        // 页面加载完成
        window.addEventListener('DOMContentLoaded', function() {
            updateStatus('正在初始化...');

            // 等待 Ruffle 加载
            const checkRuffle = setInterval(() => {
                if (typeof window.RufflePlayer !== 'undefined') {
                    clearInterval(checkRuffle);
                    updateStatus('Ruffle 加载成功');
                    loadGame();
                }
            }, 100);

            // 超时处理
            setTimeout(() => {
                if (typeof window.RufflePlayer === 'undefined') {
                    showError('Ruffle 模拟器加载超时，请检查网络或更换浏览器');
                }
            }, 8000);
        });

        // 快捷键
        document.addEventListener('keydown', function(e) {
            if (e.key === ' ') {
                e.preventDefault();
                startGame();
            } else if (e.key === 'r' || e.key === 'R') {
                retryLoad();
            }
        });
    </script>
</body>
</html>
