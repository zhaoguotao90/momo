<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞鹰武士 - Ruffle修复最终版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e;
            color: white; 
            font-family: Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            background: rgba(0,0,0,0.8); 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center; 
        }
        h1 { 
            color: #00ff88; 
            margin: 15px 0; 
            font-size: 24px; 
        }
        .status-box { 
            background: rgba(0, 150, 255, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #0096ff;
        }
        .game-area { 
            width: 100%; 
            height: 350px; 
            background: #000; 
            border-radius: 10px; 
            margin: 20px 0; 
            position: relative; 
            overflow: hidden; 
            border: 2px solid #333; 
        }
        button { 
            padding: 12px 25px; 
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 8px; 
            min-width: 140px;
        }
        .error-box { 
            background: rgba(255, 50, 50, 0.1);
            border: 2px solid #ff3232;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .success-box { 
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 飞鹰武士 Flash游戏</h1>
        
        <div class="status-box">
            <strong>状态：</strong><span id="status">正在初始化...</span>
        </div>
        
        <div class="game-area">
            <div id="ruffle-container"></div>
        </div>
        
        <div class="success-box" id="success-msg" style="display:none;">
            <div style="font-size:20px; color:#00ff88;">✅ 文件验证成功！</div>
            <div>游戏文件有效，可以开始游戏</div>
        </div>
        
        <div class="error-box" id="error-msg" style="display:none;">
            <div style="font-size:20px; color:#ff3232;">❌ 加载失败</div>
            <div id="error-text"></div>
        </div>
        
        <div>
            <button onclick="startGame()" id="start-btn" disabled>▶️ 开始游戏</button>
            <button onclick="retryLoad()" id="retry-btn">🔄 重新加载</button>
        </div>
        
        <div style="margin-top: 20px; color: #aaa; font-size: 12px;">
            <p>如果Ruffle加载失败，请尝试：</p>
            <p>1. 切换网络（WiFi/移动数据）</p>
            <p>2. 使用Chrome浏览器</p>
            <p>3. 等待1分钟后重试</p>
        </div>
    </div>

    <!-- 使用多个Ruffle源，确保至少一个可用 -->
    <script>
        // 多个Ruffle CDN源
        const ruffleSources = [
            'https://unpkg.com/@ruffle-rs/ruffle@0.1.0-nightly.2024.6.5/ruffle.js',
            'https://cdn.jsdelivr.net/npm/@ruffle-rs/ruffle@0.1.0-nightly.2024.6.5/ruffle.js',
            'https://ruffle.rs/demo/ruffle.js',
            'https://unpkg.com/@ruffle-rs/ruffle@latest/dist/ruffle.js'
        ];
        
        let currentSourceIndex = 0;
        let ruffleLoaded = false;
        let player = null;
        
        function updateStatus(text) {
            document.getElementById('status').textContent = text;
            console.log('状态:', text);
        }
        
        function showError(msg) {
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }
        
        function showSuccess() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
        }
        
        function loadRuffleScript() {
            if (currentSourceIndex >= ruffleSources.length) {
                showError('所有Ruffle源都加载失败，请检查网络');
                return;
            }
            
            const src = ruffleSources[currentSourceIndex];
            updateStatus(`加载Ruffle (源${currentSourceIndex + 1}/${ruffleSources.length})...`);
            
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                
                script.onload = () => {
                    console.log(`✅ Ruffle加载成功: ${src}`);
                    ruffleLoaded = true;
                    resolve(true);
                };
                
                script.onerror = () => {
                    console.log(`❌ Ruffle加载失败: ${src}`);
                    currentSourceIndex++;
                    script.remove();
                    loadRuffleScript().then(resolve);
                };
                
                document.head.appendChild(script);
            });
        }
        
        async function initGame() {
            try {
                updateStatus('正在加载Ruffle模拟器...');
                
                // 加载Ruffle
                await loadRuffleScript();
                
                if (!window.RufflePlayer) {
                    throw new Error('Ruffle对象未定义');
                }
                
                updateStatus('Ruffle加载成功，正在初始化游戏...');
                
                // 创建播放器
                const ruffle = window.RufflePlayer.newest();
                player = ruffle.createPlayer();
                
                const container = document.getElementById('ruffle-container');
                container.innerHTML = '';
                container.appendChild(player);
                
                player.style.width = '100%';
                player.style.height = '100%';
                
                // 加载游戏文件
                updateStatus('正在加载游戏文件...');
                
                // 使用GitHub Pages路径
                const gamePath = window.location.pathname.includes('/momo/') 
                    ? '/momo/feiyingwushi.swf'
                    : 'feiyingwushi.swf';
                
                await player.load(gamePath);
                
                updateStatus('游戏加载完成！');
                showSuccess();
                document.getElementById('start-btn').disabled = false;
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError(`加载失败: ${error.message}`);
                updateStatus('加载失败');
            }
        }
        
        function startGame() {
            if (player) {
                try {
                    player.play();
                    updateStatus('游戏运行中...');
                } catch (error) {
                    showError(`启动失败: ${error.message}`);
                }
            }
        }
        
        function retryLoad() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('start-btn').disabled = true;
            currentSourceIndex = 0;
            ruffleLoaded = false;
            player = null;
            
            // 移除所有已加载的Ruffle脚本
            document.querySelectorAll('script[src*="ruffle"]').forEach(s => s.remove());
            
            initGame();
        }
        
        // 页面加载后启动
        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
