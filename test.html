<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞鹰武士 - 终极修复版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: white; 
            font-family: Arial, sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            flex-direction: column;
            padding: 20px;
        }
        .container { 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
        }
        h1 { 
            color: #ff9900; 
            margin: 20px 0; 
            font-size: 24px; 
        }
        .status { 
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 16px;
        }
        .game-container { 
            width: 100%; 
            height: 400px; 
            background: #111; 
            border-radius: 10px; 
            margin: 20px 0; 
            overflow: hidden; 
            border: 2px solid #333; 
        }
        #game { 
            width: 100%; 
            height: 100%; 
        }
        button { 
            padding: 12px 30px; 
            background: #ff9900; 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            margin: 10px; 
            font-size: 16px;
        }
        button:disabled { 
            background: #666; 
            cursor: not-allowed; 
        }
        .error { 
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #f00;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .step { 
            background: rgba(0, 150, 255, 0.1);
            border-left: 4px solid #0096ff;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 飞鹰武士 Flash游戏</h1>
        
        <div class="step">
            <strong>步骤1：</strong> 检测GitHub Pages状态
            <div id="pages-status">检测中...</div>
        </div>
        
        <div class="step">
            <strong>步骤2：</strong> 加载游戏文件
            <div id="file-status">等待中...</div>
        </div>
        
        <div class="status" id="status">正在初始化，请稍候...</div>
        
        <div class="game-container">
            <div id="game"></div>
        </div>
        
        <div class="error" id="error-box">
            <div id="error-text"></div>
            <div style="margin-top: 20px;">
                <button onclick="location.reload()">🔄 刷新页面</button>
                <button onclick="checkPages()">🔍 检查Pages</button>
            </div>
        </div>
        
        <button onclick="startGame()" id="start-btn" disabled>▶️ 开始游戏</button>
        
        <div style="margin-top: 30px; color: #aaa; font-size: 12px;">
            <p>访问地址：<strong>https://zhaoguotao90.github.io/momo/</strong></p>
            <p>如果持续黑屏，请尝试更换浏览器或网络</p>
        </div>
    </div>

    <!-- 核心游戏代码 -->
    <script>
        // 配置信息
        const CONFIG = {
            githubUser: "zhaoguotao90",
            repoName: "momo",
            swfFile: "feiyingwushi.swf",
            ruffleVersion: "0.1.0-nightly.2024.6.5"
        };
        
        // 状态跟踪
        let gameState = {
            pagesReady: false,
            ruffleReady: false,
            swfReady: false,
            player: null
        };
        
        // 更新状态显示
        function updateStatus(text) {
            const statusEl = document.getElementById('status');
            if (statusEl) statusEl.textContent = text;
            console.log("状态:", text);
        }
        
        function updatePagesStatus(text, isOk = false) {
            const el = document.getElementById('pages-status');
            if (el) el.innerHTML = isOk ? `✅ ${text}` : `⏳ ${text}`;
        }
        
        function updateFileStatus(text, isOk = false) {
            const el = document.getElementById('file-status');
            if (el) el.innerHTML = isOk ? `✅ ${text}` : `⏳ ${text}`;
        }
        
        // 显示错误
        function showError(message, details = "") {
            const errorBox = document.getElementById('error-box');
            const errorText = document.getElementById('error-text');
            if (errorBox) errorBox.style.display = 'block';
            if (errorText) errorText.innerHTML = `<strong>❌ 错误：</strong>${message}<br><small>${details}</small>`;
            updateStatus("加载失败");
        }
        
        // 检查GitHub Pages是否就绪
        async function checkGitHubPages() {
            updatePagesStatus("检查GitHub Pages部署...");
            
            try {
                // 测试网站是否能访问
                const response = await fetch(window.location.href, { 
                    method: 'HEAD',
                    cache: 'no-cache'
                });
                
                if (response.ok) {
                    updatePagesStatus("GitHub Pages运行正常", true);
                    gameState.pagesReady = true;
                    return true;
                } else {
                    updatePagesStatus(`Pages返回状态: ${response.status}`);
                    return false;
                }
            } catch (error) {
                updatePagesStatus(`网络错误: ${error.message}`);
                return false;
            }
        }
        
        // 检查游戏文件是否存在
        async function checkGameFile() {
            updateFileStatus("检查游戏文件...");
            
            const fileUrls = [
                // 主路径（GitHub Pages）
                `${window.location.origin}/${CONFIG.repoName}/${CONFIG.swfFile}`,
                // 备用路径
                `https://raw.githubusercontent.com/${CONFIG.githubUser}/${CONFIG.repoName}/main/${CONFIG.swfFile}`,
                // 相对路径
                CONFIG.swfFile
            ];
            
            for (let i = 0; i < fileUrls.length; i++) {
                const url = fileUrls[i];
                try {
                    const response = await fetch(url, { 
                        method: 'HEAD',
                        cache: 'no-cache'
                    });
                    
                    if (response.ok) {
                        updateFileStatus(`文件找到: ${url}`, true);
                        gameState.swfReady = true;
                        return url; // 返回可用的URL
                    }
                } catch (error) {
                    console.log(`尝试 ${url} 失败:`, error.message);
                }
            }
            
            updateFileStatus("未找到游戏文件");
            return null;
        }
        
        // 加载Ruffle
        function loadRuffle() {
            return new Promise((resolve, reject) => {
                updateStatus("加载Ruffle模拟器...");
                
                // 创建脚本
                const script = document.createElement('script');
                script.src = `https://unpkg.com/@ruffle-rs/ruffle@${CONFIG.ruffleVersion}/ruffle.js`;
                
                script.onload = () => {
                    console.log("✅ Ruffle加载成功");
                    gameState.ruffleReady = true;
                    updateStatus("Ruffle加载完成");
                    resolve(true);
                };
                
                script.onerror = () => {
                    console.log("❌ Ruffle加载失败");
                    reject(new Error("无法加载Ruffle模拟器"));
                };
                
                // 添加到页面
                document.head.appendChild(script);
                
                // 设置超时
                setTimeout(() => {
                    if (!gameState.ruffleReady) {
                        reject(new Error("Ruffle加载超时"));
                    }
                }, 10000);
            });
        }
        
        // 初始化游戏
        async function initGame() {
            try {
                updateStatus("开始初始化...");
                
                // 1. 检查Pages
                const pagesOk = await checkGitHubPages();
                if (!pagesOk) {
                    showError(
                        "GitHub Pages可能未正确配置",
                        "请检查仓库Settings → Pages，确保已启用并部署到main分支的根目录"
                    );
                    return;
                }
                
                // 2. 检查文件
                const swfUrl = await checkGameFile();
                if (!swfUrl) {
                    showError(
                        "找不到游戏文件",
                        `请确保 ${CONFIG.swfFile} 文件已上传到仓库根目录`
                    );
                    return;
                }
                
                // 3. 加载Ruffle
                try {
                    await loadRuffle();
                } catch (ruffleError) {
                    showError(
                        "Ruffle模拟器加载失败",
                        "可能是网络问题，请稍后重试或更换网络环境"
                    );
                    return;
                }
                
                // 4. 创建播放器
                if (window.RufflePlayer && window.RufflePlayer.newest) {
                    const ruffle = window.RufflePlayer.newest();
                    gameState.player = ruffle.createPlayer();
                    
                    const container = document.getElementById('game');
                    container.innerHTML = '';
                    container.appendChild(gameState.player);
                    gameState.player.style.width = '100%';
                    gameState.player.style.height = '100%';
                    
                    // 5. 加载游戏
                    updateStatus("正在加载游戏...");
                    await gameState.player.load(swfUrl);
                    
                    updateStatus("✅ 游戏加载完成！");
                    document.getElementById('start-btn').disabled = false;
                    
                } else {
                    showError("Ruffle初始化失败", "Ruffle对象未正确加载");
                }
                
            } catch (error) {
                console.error("初始化错误:", error);
                showError("初始化失败", error.message);
            }
        }
        
        // 开始游戏
        function startGame() {
            if (gameState.player) {
                try {
                    gameState.player.play();
                    updateStatus("🎮 游戏运行中...");
                } catch (error) {
                    showError("启动游戏失败", error.message);
                }
            }
        }
        
        // 检查Pages状态
        function checkPages() {
            const pagesUrl = `https://github.com/${CONFIG.githubUser}/${CONFIG.repoName}/settings/pages`;
            window.open(pagesUrl, '_blank');
        }
        
        // 页面加载完成后启动
        window.addEventListener('DOMContentLoaded', () => {
            // 添加重试机制
            setTimeout(initGame, 1000);
            
            // 如果10秒后仍在加载，显示提示
            setTimeout(() => {
                if (!gameState.ruffleReady) {
                    updateStatus("加载时间较长，请耐心等待...");
                }
            }, 10000);
        });
        
        // 页面可见性变化时重试
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && !gameState.ruffleReady) {
                console.log("页面重新可见，尝试重新加载");
                location.reload();
            }
        });
    </script>
</body>
</html>
