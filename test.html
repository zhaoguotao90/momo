<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞鹰武士 - 文件验证版</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            color: white; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding: 20px; 
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 { 
            color: #ffcc00; 
            margin: 10px 0;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .subtitle {
            color: #ddd;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .game-container { 
            width: 100%;
            max-width: 600px;
            background: rgba(0,0,0,0.85); 
            border-radius: 15px; 
            padding: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .status-box { 
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            border-left: 4px solid #3498db;
        }
        
        .game-area { 
            width: 100%; 
            height: 400px; 
            background: #000; 
            border-radius: 10px; 
            margin: 20px 0; 
            position: relative; 
            overflow: hidden; 
            border: 3px solid #444; 
        }
        
        #ruffle-container { 
            width: 100%; 
            height: 100%; 
        }
        
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        button { 
            padding: 14px 28px; 
            background: linear-gradient(to bottom, #ffcc00, #ff9900);
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px;
            cursor: pointer; 
            min-width: 150px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error-box { 
            background: rgba(231, 76, 60, 0.2); 
            border: 2px solid #e74c3c; 
            border-radius: 10px; 
            padding: 20px; 
            margin: 20px 0; 
            display: none; 
        }
        
        .error-title {
            color: #e74c3c;
            font-size: 20px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .debug-panel { 
            background: rgba(52, 152, 219, 0.1); 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 13px; 
            margin: 20px 0; 
            font-family: 'Courier New', monospace;
        }
        
        .debug-title {
            color: #3498db;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .log-item {
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            background: rgba(0,0,0,0.3);
            word-break: break-all;
        }
        
        .success { color: #2ecc71; }
        .error { color: #e74c3c; }
        .warning { color: #f39c12; }
        .info { color: #3498db; }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 20px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #ffcc00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .file-info {
            background: rgba(52, 73, 94, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .url-box {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            word-break: break-all;
            font-size: 12px;
        }
        
        .success-message {
            background: rgba(46, 204, 113, 0.2);
            border: 2px solid #2ecc71;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .game-area { 
                height: 350px; 
            }
            
            button { 
                min-width: 140px;
                padding: 12px 20px;
            }
        }
        
        @media (max-width: 480px) {
            .game-area { 
                height: 300px; 
            }
            
            .game-container {
                padding: 20px 15px;
            }
            
            button { 
                min-width: 130px;
                padding: 10px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦅 飞鹰武士</h1>
        <p class="subtitle">经典Flash动作游戏 - 文件验证版</p>
    </div>
    
    <div class="game-container">
        <div class="status-box">
            <strong>状态：</strong><span id="status-text">正在初始化...</span>
        </div>
        
        <div class="game-area">
            <div class="loading" id="loading-screen">
                <div class="spinner"></div>
                <div id="loading-message">正在检查文件有效性...</div>
            </div>
            
            <div id="ruffle-container">
                <!-- Ruffle播放器将在这里加载 -->
            </div>
        </div>
        
        <div class="error-box" id="error-box">
            <div class="error-title">⚠️ 文件验证失败</div>
            <p id="error-message">游戏文件格式不正确，请重新上传正确的SWF文件。</p>
            <div class="controls" style="margin-top: 20px;">
                <button onclick="verifyFile()" style="background: linear-gradient(to bottom, #3498db, #2980b9); color: white;">重新验证文件</button>
                <button onclick="showHelp()" style="background: linear-gradient(to bottom, #9b59b6, #8e44ad); color: white;">获取帮助</button>
            </div>
        </div>
        
        <div class="success-message" id="success-box" style="display: none;">
            <div style="font-size: 24px; margin-bottom: 10px;">✅ 文件验证成功！</div>
            <p>游戏文件有效，正在准备运行环境...</p>
        </div>
        
        <div class="controls">
            <button onclick="startGame()" id="start-btn" disabled>▶️ 开始游戏</button>
            <button onclick="retryLoad()" id="retry-btn">🔄 重新加载</button>
            <button onclick="checkFileInfo()" style="background: linear-gradient(to bottom, #3498db, #2980b9); color: white;">🔍 检查文件</button>
        </div>
        
        <div class="debug-panel">
            <div class="debug-title">🔧 调试信息</div>
            <div id="debug-logs"></div>
        </div>
        
        <div class="file-info" id="file-info" style="display: none;">
            <div style="font-size: 16px; margin-bottom: 10px; color: #3498db;">📁 文件信息</div>
            <div id="file-details"></div>
        </div>
        
        <div style="margin-top: 25px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px;">
            <div style="font-size: 14px; color: #ffcc00; margin-bottom: 10px;">💡 重要提示</div>
            <div style="font-size: 12px; line-height: 1.5;">
                <p>1. 请确保您上传的是真正的 <strong>feiyingwushi.swf</strong> 文件</p>
                <p>2. 您可以直接访问此链接查看文件：</p>
                <div class="url-box" id="file-url"></div>
                <p>3. 如果文件损坏，请重新下载并上传到GitHub</p>
            </div>
        </div>
    </div>

    <!-- 使用最新Ruffle版本 -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle@latest/dist/ruffle.js"></script>
    
    <script>
        // 全局变量
        let ruffle = null;
        let player = null;
        let fileValid = false;
        let debugLogs = [];
        
        // SWF文件路径
        const filePaths = [
            { 
                name: "主路径", 
                url: "/momo/feiyingwushi.swf",
                type: "absolute"
            },
            { 
                name: "相对路径", 
                url: "feiyingwushi.swf",
                type: "relative"
            },
            { 
                name: "GitHub原始文件", 
                url: "https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf",
                type: "raw"
            },
            { 
                name: "根路径", 
                url: "/feiyingwushi.swf",
                type: "root"
            }
        ];
        
        // 添加调试日志
        function addLog(message, type = "info") {
            const now = new Date();
            const time = now.toLocaleTimeString();
            const logEntry = {
                time: time,
                message: message,
                type: type
            };
            
            debugLogs.push(logEntry);
            
            const logElement = document.createElement("div");
            logElement.className = `log-item ${type}`;
            logElement.innerHTML = `<span style="color: #7f8c8d;">[${time}]</span> ${message}`;
            
            const logsContainer = document.getElementById("debug-logs");
            if (logsContainer) {
                logsContainer.appendChild(logElement);
                logsContainer.scrollTop = logsContainer.scrollHeight;
            }
        }
        
        // 更新状态
        function updateStatus(text) {
            const statusElement = document.getElementById("status-text");
            if (statusElement) {
                statusElement.textContent = text;
            }
            addLog(`状态更新: ${text}`, "info");
        }
        
        // 显示/隐藏加载界面
        function showLoading(show, message = "") {
            const loadingScreen = document.getElementById("loading-screen");
            const loadingMessage = document.getElementById("loading-message");
            
            if (loadingScreen) {
                loadingScreen.style.display = show ? "flex" : "none";
            }
            
            if (loadingMessage && message) {
                loadingMessage.textContent = message;
            }
        }
        
        // 显示错误
        function showError(message, details = "") {
            const errorBox = document.getElementById("error-box");
            const errorMessage = document.getElementById("error-message");
            
            if (errorBox) errorBox.style.display = "block";
            if (errorMessage) errorMessage.textContent = message;
            
            addLog(`错误: ${message}`, "error");
            if (details) {
                addLog(`详情: ${details}`, "warning");
            }
            
            // 隐藏成功消息
            document.getElementById("success-box").style.display = "none";
            updateStatus("加载失败");
        }
        
        // 显示成功
        function showSuccess(message) {
            const successBox = document.getElementById("success-box");
            if (successBox) {
                successBox.style.display = "block";
                successBox.querySelector("p").textContent = message;
            }
            
            addLog(`成功: ${message}`, "success");
        }
        
        // 隐藏错误
        function hideError() {
            const errorBox = document.getElementById("error-box");
            if (errorBox) errorBox.style.display = "none";
        }
        
        // 检查SWF文件有效性
        async function checkSWFValidity(url) {
            addLog(`开始验证文件: ${url}`, "info");
            
            try {
                // 尝试获取文件信息
                const response = await fetch(url, { method: 'HEAD' });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                // 检查文件类型
                const contentType = response.headers.get('content-type') || '';
                const contentLength = response.headers.get('content-length') || '未知';
                
                addLog(`文件类型: ${contentType}`, "info");
                addLog(`文件大小: ${Math.round(contentLength / 1024)} KB`, "info");
                
                // SWF文件应该以"application/x-shockwave-flash"或"application/octet-stream"开头
                const isLikelySWF = contentType.includes('application/x-shockwave-flash') || 
                                    contentType.includes('application/octet-stream') ||
                                    url.toLowerCase().endsWith('.swf');
                
                if (!isLikelySWF) {
                    addLog(`警告: 文件可能不是SWF格式 (Content-Type: ${contentType})`, "warning");
                }
                
                // 尝试获取文件前几个字节以验证SWF签名
                const headResponse = await fetch(url, { 
                    method: 'GET',
                    headers: { 'Range': 'bytes=0-7' } // 只获取前8个字节
                });
                
                if (headResponse.ok) {
                    const buffer = await headResponse.arrayBuffer();
                    const view = new Uint8Array(buffer);
                    
                    // SWF文件应该以"FWS"或"CWS"开头
                    const signature = String.fromCharCode(view[0], view[1], view[2]);
                    addLog(`文件签名: ${signature}`, "info");
                    
                    if (signature === 'FWS' || signature === 'CWS' || signature === 'ZWS') {
                        addLog("✅ 文件签名验证通过 - 这是一个有效的SWF文件", "success");
                        return {
                            valid: true,
                            type: "valid_swf",
                            size: contentLength,
                            signature: signature
                        };
                    } else {
                        addLog(`❌ 无效的SWF文件签名: ${signature}`, "error");
                        return {
                            valid: false,
                            type: "invalid_signature",
                            size: contentLength,
                            signature: signature
                        };
                    }
                }
                
                return {
                    valid: isLikelySWF,
                    type: isLikelySWF ? "likely_swf" : "unknown_type",
                    size: contentLength
                };
                
            } catch (error) {
                addLog(`验证失败: ${error.message}`, "error");
                return {
                    valid: false,
                    type: "fetch_error",
                    error: error.message
                };
            }
        }
        
        // 显示文件信息
        function showFileInfo(info) {
            const fileInfo = document.getElementById("file-info");
            const fileDetails = document.getElementById("file-details");
            const fileUrl = document.getElementById("file-url");
            
            if (fileInfo) fileInfo.style.display = "block";
            
            let detailsHTML = `
                <div style="margin-bottom: 10px;">
                    <strong>文件状态:</strong> 
                    <span style="color: ${info.valid ? '#2ecc71' : '#e74c3c'}">
                        ${info.valid ? '✅ 有效' : '❌ 无效'}
                    </span>
                </div>
            `;
            
            if (info.size && info.size !== '未知') {
                detailsHTML += `
                    <div style="margin-bottom: 5px;">
                        <strong>文件大小:</strong> ${Math.round(info.size / 1024)} KB
                    </div>
                `;
            }
            
            if (info.signature) {
                detailsHTML += `
                    <div style="margin-bottom: 5px;">
                        <strong>文件签名:</strong> ${info.signature}
                    </div>
                `;
            }
            
            if (info.type === "invalid_signature") {
                detailsHTML += `
                    <div style="margin-top: 10px; padding: 10px; background: rgba(231, 76, 60, 0.1); border-radius: 5px;">
                        <strong>⚠️ 问题分析:</strong><br>
                        文件签名 "${info.signature}" 不是有效的SWF文件签名。<br>
                        有效的SWF文件应以 "FWS"、"CWS" 或 "ZWS" 开头。
                    </div>
                `;
            }
            
            if (fileDetails) fileDetails.innerHTML = detailsHTML;
            if (fileUrl) fileUrl.textContent = "https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf";
        }
        
        // 检查文件信息
        async function checkFileInfo() {
            updateStatus("正在检查文件信息...");
            showLoading(true, "正在分析文件...");
            
            const fileUrl = "https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf";
            const info = await checkSWFValidity(fileUrl);
            
            showFileInfo(info);
            showLoading(false);
            
            if (info.valid) {
                updateStatus("文件验证成功");
                showSuccess("文件是有效的SWF格式");
            } else {
                updateStatus("文件验证失败");
                showError("文件格式不正确，不是有效的SWF文件", `文件签名: ${info.signature || "未知"}`);
            }
        }
        
        // 初始化Ruffle
        async function initRuffle() {
            addLog("正在初始化Ruffle模拟器...", "info");
            updateStatus("初始化Ruffle");
            
            if (typeof window.RufflePlayer === 'undefined') {
                showError("Ruffle模拟器加载失败", "请检查网络连接");
                return false;
            }
            
            try {
                ruffle = window.RufflePlayer.newest();
                addLog(`Ruffle版本: ${ruffle.version}`, "success");
                return true;
            } catch (error) {
                showError("Ruffle初始化失败", error.message);
                return false;
            }
        }
        
        // 创建播放器
        function createPlayer() {
            if (!ruffle) {
                showError("Ruffle未初始化", "请先初始化Ruffle");
                return false;
            }
            
            try {
                player = ruffle.createPlayer();
                const container = document.getElementById("ruffle-container");
                
                if (container) {
                    container.innerHTML = "";
                    container.appendChild(player);
                    player.style.width = "100%";
                    player.style.height = "100%";
                }
                
                addLog("游戏播放器创建成功", "success");
                return true;
            } catch (error) {
                showError("创建播放器失败", error.message);
                return false;
            }
        }
        
        // 尝试加载游戏
        async function tryLoadGame(filePath) {
            if (!player) {
                if (!createPlayer()) {
                    return false;
                }
            }
            
            addLog(`尝试加载游戏: ${filePath.url}`, "info");
            updateStatus(`正在加载: ${filePath.name}`);
            
            try {
                await player.load(filePath.url);
                addLog(`✅ ${filePath.name} 加载成功`, "success");
                return true;
            } catch (error) {
                addLog(`❌ ${filePath.name} 加载失败: ${error.message}`, "error");
                return false;
            }
        }
        
        // 验证文件
        async function verifyFile() {
            hideError();
            showLoading(true, "正在验证文件...");
            updateStatus("文件验证中");
            
            addLog("开始文件验证流程...", "info");
            
            // 首先验证文件
            const fileUrl = "https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf";
            const fileInfo = await checkSWFValidity(fileUrl);
            
            showFileInfo(fileInfo);
            
            if (!fileInfo.valid) {
                showLoading(false);
                showError("文件验证失败", "请上传正确的SWF文件");
                return;
            }
            
            // 文件有效，尝试加载
            addLog("文件验证通过，尝试加载...", "success");
            showSuccess("文件验证通过，正在准备游戏...");
            
            // 初始化Ruffle
            if (!await initRuffle()) {
                showLoading(false);
                return;
            }
            
            // 尝试所有路径
            for (const path of filePaths) {
                const success = await tryLoadGame(path);
                if (success) {
                    fileValid = true;
                    showLoading(false);
                    updateStatus("游戏加载完成");
                    document.getElementById("start-btn").disabled = false;
                    document.getElementById("success-box").style.display = "block";
                    document.getElementById("success-box").querySelector("p").textContent = "游戏加载完成，点击开始按钮运行游戏";
                    return;
                }
            }
            
            // 所有路径都失败
            showLoading(false);
            showError("所有加载尝试都失败", "请检查网络连接和文件路径");
        }
        
        // 开始游戏
        function startGame() {
            if (player && fileValid) {
                try {
                    player.play();
                    updateStatus("游戏中...");
                    addLog("游戏已启动", "success");
                } catch (error) {
                    showError("启动游戏失败", error.message);
                }
            } else {
                showError("游戏未加载", "请先完成文件验证");
            }
        }
        
        // 重新加载
        function retryLoad() {
            hideError();
            document.getElementById("success-box").style.display = "none";
            document.getElementById("file-info").style.display = "none";
            document.getElementById("debug-logs").innerHTML = "";
            debugLogs = [];
            
            verifyFile();
        }
        
        // 显示帮助
        function showHelp() {
            addLog("显示帮助信息", "info");
            alert(
                "游戏加载问题解决方案：\n\n" +
                "1. 确保您上传了正确的SWF文件\n" +
                "2. 访问以下链接检查文件：\n" +
                "   https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf\n\n" +
                "3. 如果链接显示的不是文件下载，说明：\n" +
                "   - 文件不存在\n" +
                "   - 文件名不正确\n" +
                "   - GitHub Pages未正确配置\n\n" +
                "4. 请重新上传 feiyingwushi.swf 文件到您的GitHub仓库"
            );
        }
        
        // 页面加载完成
        window.addEventListener("DOMContentLoaded", function() {
            addLog("页面加载完成", "info");
            addLog("游戏URL: https://zhaoguotao90.github.io/momo/", "info");
            
            // 显示文件URL
            const fileUrlElement = document.getElementById("file-url");
            if (fileUrlElement) {
                fileUrlElement.textContent = "https://raw.githubusercontent.com/zhaoguotao90/momo/main/feiyingwushi.swf";
            }
            
            // 自动开始验证
            setTimeout(verifyFile, 1000);
        });
        
        // 键盘快捷键
        document.addEventListener("keydown", function(e) {
            if (e.key === " ") { // 空格键
                e.preventDefault();
                startGame();
            } else if (e.key === "r" || e.key === "R") { // R键
                retryLoad();
            } else if (e.key === "h" || e.key === "H") { // H键
                showHelp();
            }
        });
    </script>
</body>
</html>
